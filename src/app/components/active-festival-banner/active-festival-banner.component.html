@if (ctx.activeFestival(); as festival) {
  <div class="mb-4 rounded-xl bg-bg-card px-4 py-3 shadow-[0_1px_4px_rgba(0,0,0,0.08)]">
    <div class="flex items-center gap-2">
      <span class="truncate text-sm font-semibold text-text-primary"
        >Festival: {{ festival.name }}</span
      >
    </div>
    @if (ctx.adminCurrentEvent(); as event) {
      <div class="mt-1 flex items-center gap-2">
        <p class="text-xs text-text-secondary">Dogadjaj: {{ event.name }} · {{ event.year }}</p>
      </div>
    } @else {
      <p class="mt-1 text-xs text-status-error">Nema aktivnog dogadjaja.</p>
    }
  </div>
}
