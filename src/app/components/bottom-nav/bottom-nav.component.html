<nav class="fixed bottom-0 left-0 right-0 z-50 h-[60px] border-t border-border-default bg-white md:hidden">
  <div class="mx-auto flex h-full max-w-5xl items-stretch">
    @for (item of items; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive
        #rla="routerLinkActive"
        class="flex flex-1 flex-col items-center justify-center gap-0.5 transition-colors"
        [class.text-primary]="rla.isActive"
        [class.text-text-muted]="!rla.isActive"
      >
        <span
          class="h-1 w-1 rounded-full bg-accent transition-opacity"
          [class.opacity-100]="rla.isActive"
          [class.opacity-0]="!rla.isActive"
        ></span>

        <lucide-icon [name]="item.icon" [size]="20" strokeWidth="2" />

        <span class="text-[9px] font-medium uppercase tracking-[0.05em]">{{ item.label }}</span>
      </a>
    }
  </div>

  @if (showScan) {
    <!-- FAB scan button — centered above the nav bar -->
    <button
      type="button"
      (click)="scanClick.emit()"
      class="absolute left-1/2 top-0 -translate-x-1/2 -translate-y-1/2 flex h-14 w-14 items-center justify-center rounded-full bg-accent shadow-[0_4px_12px_rgba(200,217,58,0.4)] transition-colors active:bg-accent-hover"
      aria-label="Skeniraj barkod"
    >
      <lucide-icon name="scan-barcode" [size]="24" strokeWidth="2" class="text-text-on-accent" />
    </button>
  }
</nav>
