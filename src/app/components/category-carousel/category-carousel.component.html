<!-- overflow-hidden clips the translated track; dots live outside this boundary -->
<div class="overflow-hidden">
  <div
    #track
    class="flex"
    [style.gap.px]="12"
    [style.transform]="trackTransform()"
    [class.transition-transform]="!isDragging()"
    [class.duration-300]="!isDragging()"
    [class.ease-out]="!isDragging()"
  >
    @for (card of cards(); track card.categoryId; let i = $index) {
      <!-- Card wrapper: pixel width keeps sizing independent of flex container scroll width -->
      <div [style.width.px]="cardWidth()" class="flex-shrink-0">
        <button
          type="button"
          (click)="onCardClick(card.categoryId)"
          class="w-full rounded-xl p-4 text-left shadow-[0_1px_4px_rgba(0,0,0,0.08)] transition-colors"
          style="touch-action: manipulation"
          [class.bg-primary]="i === activeIndex()"
          [class.bg-bg-card]="i !== activeIndex()"
          [class.opacity-70]="i !== activeIndex()"
        >
          <!-- Header row -->
          <div class="flex items-start justify-between gap-3">
            <p
              class="font-semibold leading-snug"
              [class.text-white]="i === activeIndex()"
              [class.text-text-primary]="i !== activeIndex()"
            >
              {{ card.name }}
            </p>
            @if (card.isLocked) {
              <lucide-icon
                name="lock"
                [size]="16"
                class="mt-0.5 shrink-0"
                [class.text-white]="i === activeIndex()"
                [class.opacity-70]="i === activeIndex()"
                [class.text-status-locked]="i !== activeIndex()"
              />
            }
          </div>

          <!-- Score badge -->
          <div class="mt-2">
            <span
              class="rounded-full px-2.5 py-0.5 text-xs font-medium"
              [class]="badgeClass(i === activeIndex(), card.scoredCount === card.sampleCount && card.sampleCount > 0)"
            >
              {{ card.scoredCount }} / {{ card.sampleCount }} ocijenjeno
            </span>
          </div>

          <!-- Progress bar -->
          @if (card.sampleCount > 0) {
            <div
              class="mt-3 h-1.5 w-full overflow-hidden rounded-full"
              [class]="trackBgClass(i === activeIndex())"
            >
              <div
                class="h-full rounded-full bg-accent transition-all"
                [style.width.%]="(card.scoredCount / card.sampleCount) * 100"
              ></div>
            </div>
          }
        </button>
      </div>
    }
  </div>
</div>

<!-- Dots indicator (outside overflow-hidden so it's never clipped) -->
@if (cards().length > 1) {
  <div class="mt-3 flex justify-center gap-1.5">
    @for (card of cards(); track card.categoryId; let i = $index) {
      <button
        type="button"
        (click)="onDotClick(i)"
        class="h-2 rounded-full transition-all"
        [class.w-4]="i === focusedIndex()"
        [class.bg-primary]="i === focusedIndex()"
        [class.w-2]="i !== focusedIndex()"
        [class.bg-border-default]="i !== focusedIndex()"
      ></button>
    }
  </div>
}
