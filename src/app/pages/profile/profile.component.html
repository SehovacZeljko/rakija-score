<app-header
  title="Profil"
  [subtitle]="currentUser()?.email ?? ''"
  [backRoute]="homeRoute"
/>

<main class="min-h-screen bg-bg-app pb-24 pt-14">
  <div class="mx-auto w-full max-w-5xl p-4">

    <!-- Email (read-only) -->
    <div class="mb-4 rounded-xl bg-bg-card p-4 shadow-[0_1px_4px_rgba(0,0,0,0.08)]">
      <p class="mb-1 text-xs font-medium uppercase tracking-[0.05em] text-text-muted">Email</p>
      <p class="text-sm text-text-primary">{{ currentUser()?.email }}</p>
    </div>

    <!-- Edit username -->
    <div class="rounded-xl bg-bg-card p-4 shadow-[0_1px_4px_rgba(0,0,0,0.08)]">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
        <div class="mb-4">
          <label class="mb-1.5 block text-sm font-medium text-text-secondary" for="username">
            Korisničko ime
          </label>
          <input
            id="username"
            type="text"
            formControlName="username"
            autocomplete="username"
            class="w-full rounded-lg border border-border-default bg-bg-surface px-3 py-2.5 text-sm text-text-primary placeholder:text-text-muted transition-colors focus:border-border-focus focus:outline-none"
            placeholder="Vaše korisničko ime"
          />
          @if (form.get('username')?.invalid && form.get('username')?.touched) {
            <p class="mt-1 text-xs text-status-error">
              Korisničko ime mora imati najmanje 3 karaktera.
            </p>
          }
        </div>

        <button
          type="submit"
          [disabled]="isSaving() || form.invalid"
          class="w-full rounded-xl bg-primary py-3.5 text-sm font-semibold text-white transition-colors hover:bg-primary-dark disabled:cursor-not-allowed disabled:opacity-50"
        >
          {{ isSaving() ? 'Čuvanje...' : 'Sačuvaj' }}
        </button>
      </form>
    </div>

  </div>
</main>
